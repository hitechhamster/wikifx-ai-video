# ============================================================
# 模板: 外汇新闻 (FOREX MARKET NEWS)
# 复制这个文件夹改名 + 改下面的参数 + 换 scripts.xlsx 就是一个新模板。
# scripts.xlsx 列: script(必填) / title(输出文件名) / subject / badge / language (后三个选填,逐行覆盖)
# ============================================================

# —— 内容 ——
video_subject   = "Forex Market News"     # 默认主题(Excel 的 subject 列可逐行覆盖)
video_language  = "en"                     # en / id / zh ... (Excel 的 language 列可覆盖)
video_source    = "pexels"
video_aspect    = "9:16"

# —— 新闻包装 ——
news_mode       = true
news_badge_text = "FOREX MARKET NEWS"      # 左上角角标(Excel 的 badge 列可覆盖)

# —— 配音 ——
voice_name      = "gemini:Puck-Male"
voice_rate      = 1.2

# —— 剪辑 ——
clip_speed_factor     = 1.3
video_clip_duration   = 3.0      # 片段播出时长上限(秒)
min_clip_duration     = 2.0      # 片段播出时长下限(秒)
align_clips_to_script = true     # 一句一镜对齐
diversify_broll       = true
image_insert_every    = 5        # 每 N 段插一张静态图运镜(0=关)
material_cooldown_videos = 3     # 跨视频冷却:最近 N 条不重复(外汇素材池小,设太大会疯狂churn变慢)
video_transition_mode = "Tense"
tense_transition_count = 2

# —— 编排/素材 ——
use_orchestrator  = true
local_threshold   = 0.5
min_local_segments = 1

# —— BGM ——
use_mood_bgm    = true
force_tense_bgm = true
bgm_mode        = "auto"
bgm_file        = ""             # 自动新闻紧张曲池随机抽取
bgm_max_energy  = 4
bgm_news_safe  = true
bgm_volume      = 0.2

# —— 片头 / 片尾 ——
intro_enabled = true
intro_image   = "resource/片头.png"        # 图片片头(在上面叠"从左到右擦入"的文字动效)
intro_text    = "FOREX MARKET NEWS"        # 擦入的文字(Excel 的 badge 列可逐行覆盖)
outro_video   = "resource/片尾.mp4"        # 新片尾视频
outro_seconds = 3                          # 片尾截到 3 秒(后面几乎静止)
